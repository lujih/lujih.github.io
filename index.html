<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽卡功能</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .card {
            margin-top: 20px;
            width: 300px;
            height: 200px;
            background-color: #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            box-sizing: border-box;
        }
        .card img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 10px;
        }
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>欢迎来到抽卡页面</h1>
        <button id="drawCardBtn">抽卡</button>
        <div class="card" id="cardContainer">
            <p>请点击“抽卡”按钮</p>
        </div>
        <p id="statusMessage"></p>
    </div>

    <script>
        const drawCardBtn = document.getElementById("drawCardBtn");
        const cardContainer = document.getElementById("cardContainer");
        const statusMessage = document.getElementById("statusMessage");

        // 当点击按钮时触发抽卡
        drawCardBtn.addEventListener("click", async () => {
            // 禁用按钮，防止重复点击
            drawCardBtn.disabled = true;
            statusMessage.textContent = "正在抽卡，请稍等...";

            try {
                // 调用 Cloudflare Worker API 获取图片
                const response = await fetch("https://blogx.3369661439.workers.dev/"); // 替换成实际 Worker 的 URL
                const data = await response.json();

                if (data.imageUrl) {
                    // 显示抽到的图片
                    cardContainer.innerHTML = `<img src="${data.imageUrl}" alt="抽卡结果">`;
                    statusMessage.textContent = "恭喜你！你抽到了一张图片。";
                } else {
                    cardContainer.innerHTML = "<p>未能获取到图片，请稍后重试。</p>";
                    statusMessage.textContent = "发生错误，请稍后重试。";
                }
            } catch (error) {
                console.error("抽卡失败：", error);
                statusMessage.textContent = "网络错误，请稍后再试。";
            } finally {
                // 恢复按钮可点击状态
                drawCardBtn.disabled = false;
            }
        });
    </script>

</body>
</html>
