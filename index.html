<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽卡</title>
    <style>
        body {
            text-align: center;
            padding: 20px;
        }
        #result {
            margin-top: 20px;
        }
        img {
            width: 300px;
            height: auto;
        }
    </style>
</head>
<body>
    <h1>点击按钮抽卡</h1>
    <button id="drawCard">抽卡</button>
    <div id="result"></div>

    <script>
        document.getElementById('drawCard').addEventListener('click', async () => {
            // 请求Worker返回的图片
            const response = await fetch('/https://chouka.3369661439.workers.dev/');
            const imageBlob = await response.blob();
            
            // 在页面上显示返回的图片
            const resultDiv = document.getElementById('result');
            const img = document.createElement('img');
            img.src = URL.createObjectURL(imageBlob);
            resultDiv.innerHTML = '';  // 清空之前的内容
            resultDiv.appendChild(img);
        });
    </script>
</body>
</html>
