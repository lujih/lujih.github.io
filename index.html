<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>抽卡页面</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    #card-image {
      width: 300px;
      height: 300px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>点击抽卡</h1>
  <button id="draw-card-btn">抽卡</button>
  <div>
    <img id="card-image" src="" alt="卡片图片" style="display: none;">
  </div>

  <script>
    document.getElementById('draw-card-btn').addEventListener('click', async () => {
      try {
        // 向 Cloudflare Worker 请求图片 URL
        const response = await fetch('https://chouka.3369661439.workers.dev'); // 替换为你的 Worker URL
        const data = await response.json();
        
        // 显示图片
        const imageElement = document.getElementById('card-image');
        imageElement.src = data.imageUrl;
        imageElement.style.display = 'block';
      } catch (error) {
        console.error('Failed to fetch the card image:', error);
      }
    });
  </script>
</body>
</html>
